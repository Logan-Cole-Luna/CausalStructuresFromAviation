# =============================================================================
#  NTSB Causal Chain Extraction — Configuration
#  Team: Madeline Gorman, Katherine Hoffsetz, Logan Luna, Stephanie Ramsey
# =============================================================================

# -----------------------------------------------------------------------------
[global]
# -----------------------------------------------------------------------------
# Unified sample size applied to ALL models for fair comparison.
# Override at runtime with:  python main.py --sample N
# Set to 0 to use the entire dataset.
sample_n = 0

# -----------------------------------------------------------------------------
[paths]
# -----------------------------------------------------------------------------
data_path   = data/clean/cleaned_narritives_and_findings.csv
output_dir  = outputs

# -----------------------------------------------------------------------------
[traditional_nlp]
# -----------------------------------------------------------------------------
# dep-parse sample is now controlled by [global] sample_n

# -----------------------------------------------------------------------------
[transformer]
# (Legacy) Configuration for old DistilBERT classifier — no longer used
# Kept for reference; use [bert_extractor] and [gpt2_extractor] instead
# -----
model_name    = distilbert-base-uncased
epochs        = 10
batch_size    = 16
lr            = 2e-5
max_length    = 256
test_size     = 0.15
val_size      = 0.15
use_amp       = true
amp_dtype     = auto
compile_model = false
use_class_weights = true
early_stopping_patience = 3

# Cross-validation split (60/20/20)
# train_frac = 0.6, val_frac = 0.2, test_frac = 0.2

# -----------------------------------------------------------------------------
[bert_extractor]
# DistilBERT-based causal triple extractor with BIO tagging
# -----
model_name    = distilbert-base-uncased
epochs        = 5
batch_size    = 16
lr            = 2e-5
max_length    = 128
use_amp       = true
early_stopping_patience = 3

# Hyperparameter tuning (optional)
# Set hp_tuning = true to enable Optuna-based optimization
hp_tuning     = false
hp_n_trials   = 10

# [bert_extractor] Hyperparameter ranges (if hp_tuning = true)
# lr:         float, log-space: [1e-5, 1e-3]
# batch_size: int [8, 32]
# epochs:     int [3, 10]

# -----------------------------------------------------------------------------
[gpt2_extractor]
# DistilGPT2-based causal triple extractor with BIO tagging
# Similar architecture to BERT but with GPT2 backbone
# -----
model_name    = distilgpt2
epochs        = 5
batch_size    = 16
lr            = 2e-5
max_length    = 128
use_amp       = true
early_stopping_patience = 3

# Hyperparameter tuning (optional)
hp_tuning     = false
hp_n_trials   = 10

# -----------------------------------------------------------------------------
[llm_extractor]
# -----------------------------------------------------------------------------
# HuggingFace model for prompt-based causal extraction (Model 4)
# Mistral-7B-Instruct-v0.3 chosen for: strong instruction-following,
# structured JSON output, and comfortable fit on 16 GB VRAM in 4-bit (~4 GB).
model_name     = mistralai/Mistral-7B-Instruct-v0.3
# LLM sample is now controlled by [global] sample_n
# Max new tokens per response
max_new_tokens = 1000
# Load model in 4-bit (requires bitsandbytes); falls back to float16 if unavailable
load_in_4bit   = true
# Greedy decoding (temperature ignored); set > 0 to enable sampling
temperature    = 0.0
# Batch size for LLM inference
batch_size     = 8
# Random seed for reproducible sampling
seed           = 42
# Retries per narrative when JSON parsing fails (0 = no retry)
max_retries    = 1
# Path to the per-narrative response cache (relative to project root).
# Delete this file to force a full re-run. Leave blank to disable caching.
cache_path     = outputs/extractions/llm_response_cache.json

# -----------------------------------------------------------------------------
[knowledge_graph]
# -----------------------------------------------------------------------------
# Number of top-degree nodes shown in the KG visualization
visualize_top_n = 40
# Strip generic artifact nodes (e.g. "the accident") before building graph
noise_filter        = true
# Lowercase and strip leading articles ("the", "a", "an", etc.) to merge duplicate nodes
normalize_entities  = true
